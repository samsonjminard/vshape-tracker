// ── Build context from training data ───────────────────────
function buildCoachContext() {
  const profile = loadProfile();
  const today   = todayStr();
  const allData = loadData();

  // Profile
  const profileStr = [
    profile.name ? `Nombre: ${profile.name}` : '',
    `Edad: ${profile.age} años`,
    `Peso: ${profile.weight} kg`,
    `Objetivo: ${profile.goal}`,
  ].filter(Boolean).join(', ');

  // Plan summary
  const planStr = DAY_ORDER.map(dk => {
    const day = PLAN[dk];
    const exs = day.blocks.flatMap(b => b.exercises.map(e => `${e.id}:${e.name}(${e.repsLabel})`));
    return `${day.label}[${day.sub}]: ${exs.join(', ')}`;
  }).join('\n');

  // Recent sessions (last 30 days)
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  const sessionLines = [];
  const sessionNotes = [];

  DAY_ORDER.forEach(dk => {
    const suffix_prefix = `_${dk}_`;
    const sessPrefix = 'session_' + dk.replace(/ /g,'_') + '_';
    const notePrefix = 'sessionnote_' + dk.replace(/ /g,'_') + '_';

    // Session durations
    Object.entries(allData).forEach(([k, v]) => {
      if (k.startsWith(sessPrefix)) {
        const date = k.replace(sessPrefix, '');
        if (date >= cutoffStr) sessionLines.push(`${date} ${dk}: duración ${Math.floor(v.durationSecs/60)}min`);
      }
      if (k.startsWith(notePrefix)) {
        const date = k.replace(notePrefix, '');
        if (date >= cutoffStr && v.note) sessionNotes.push(`${date} ${dk}: "${v.note}"`);
      }
    });

    // Exercise data
    PLAN[dk].blocks.forEach(block => {
      block.exercises.forEach(ex => {
        const suffix = `_${dk}_${block.id}_${ex.id}`;
        const entries = Object.entries(allData)
          .filter(([k]) => k.endsWith(suffix))
          .map(([k, v]) => ({ date: k.replace(suffix,''), val: v }))
          .filter(({ date }) => /^\d{4}-\d{2}-\d{2}$/.test(date) && date >= cutoffStr)
          .sort((a,b) => a.date.localeCompare(b.date));

        entries.forEach(({ date, val }) => {
          if (!val.sets || !val.completed) return;
          const sets = val.sets
            .map((s, i) => val.completed[i]
              ? `${s.weight||'BW'}kg×${s.reps||'?'}${s.rpe ? `@${s.rpe}` : ''}`
              : null)
            .filter(Boolean);
          if (sets.length) sessionLines.push(`${date} ${dk} ${ex.id}(${ex.name}): ${sets.join(' | ')}`);
        });
      });
    });
  });

  sessionLines.sort();

  return `Eres un entrenador personal experto con 15 años de experiencia en fitness y salud. Asesoras a este usuario de forma personalizada y directa, usando sus datos reales de entrenamiento.

PERFIL DEL USUARIO:
${profileStr}

PLAN ACTUAL (V-Shape Program):
${planStr}

HISTORIAL ÚLTIMOS 30 DÍAS (fecha · día · ejercicio: series):
${sessionLines.length ? sessionLines.join('\n') : 'Sin datos aún.'}

NOTAS DE SESIÓN:
${sessionNotes.length ? sessionNotes.join('\n') : 'Sin notas.'}

FECHA HOY: ${today}

INSTRUCCIONES:
- Responde siempre en español
- Sé directo, práctico y conciso (máximo 200 palabras salvo que se pida análisis detallado)
- Usa los datos reales del historial para fundamentar tus respuestas
- Si detectas patrones (fatiga, estancamiento, progresión), coméntalos proactivamente
- Cuando sugieras cambios de carga, sé específico (ej: "sube a 25kg en PDR")
- No repitas el perfil del usuario en cada respuesta`;
}

// ── Render messages ─────────────────────────────────────────
function renderCoachMessages() {
  const container = document.getElementById('coach-messages');
  if (!container) return;
  container.innerHTML = coachMessages.map(m => {
    if (m.role === 'system-ui') {
      return `<div class="coach-msg system">${m.content}</div>`;
    }
    const cls = m.role === 'user' ? 'user' : 'assistant';
    const formatted = m.role === 'assistant' ? formatCoachText(m.content) : escapeHtml(m.content);
    return `<div class="coach-msg ${cls}">${formatted}</div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function formatCoachText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•]\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addThinkingBubble() {
  const container = document.getElementById('coach-messages');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'coach-msg thinking-bubble';
  el.id = 'coach-thinking';
  el.innerHTML = '● ● ●';
  el.style.letterSpacing = '4px';
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}
function removeThinkingBubble() {
  const el = document.getElementById('coach-thinking');
  if (el) el.remove();
}

// ── Send message ────────────────────────────────────────────
async function coachSend(prefill) {
  const input = document.getElementById('coach-input');
  const text  = (prefill || input.value).trim();
  if (!text || coachThinking) return;

  const workerUrl = loadWorkerUrl();
  if (!workerUrl) {
    showToast('Configura primero la URL del Worker', '#f87171');
    document.getElementById('worker-url-input').focus();
    return;
  }

  // Add user message
  coachMessages.push({ role: 'user', content: text });
  if (!prefill) { input.value = ''; input.style.height = 'auto'; }
  renderCoachMessages();

  // Disable input while thinking
  coachThinking = true;
  setCoachStatus('thinking');
  document.getElementById('btn-coach-send').disabled = true;
  addThinkingBubble();

  try {
    // Build messages array for API (exclude system-ui messages)
    const apiMessages = coachMessages
      .filter(m => m.role !== 'system-ui')
      .map(m => ({ role: m.role, content: m.content }));

    const resp = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: buildCoachContext(),
        messages: apiMessages,
      }),
    });

    const data = await resp.json();

    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const reply = data.content?.[0]?.text || '(Sin respuesta)';
    coachMessages.push({ role: 'assistant', content: reply });
    setCoachStatus('ready');

  } catch (err) {
    coachMessages.push({ role: 'assistant', content: `⚠️ Error al conectar con el Worker: ${err.message}` });
    setCoachStatus('error');
  } finally {
    coachThinking = false;
    removeThinkingBubble();
    document.getElementById('btn-coach-send').disabled = false;
    renderCoachMessages();
  }
}

function coachKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); coachSend(); }
}

function autoResizeCoachInput() {
  const ta = document.getElementById('coach-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  document.getElementById('btn-coach-send').disabled = ta.value.trim().length === 0;
}

// ── Init coach view ─────────────────────────────────────────
function initCoachView() {
  // Worker URL
  const saved = loadWorkerUrl();
  const input = document.getElementById('worker-url-input');
  if (input) {
    input.value = saved;
    if (saved) { input.classList.add('ok'); setCoachStatus('ready'); }
  }

  // Chips
  const chips = document.getElementById('coach-chips');
  if (chips) {
    chips.innerHTML = COACH_CHIPS.map(c =>
      `<button class="coach-chip" onclick="coachSend('${c.replace(/'/g,"&#39;")}')">${c}</button>`
    ).join('');
  }

  // Welcome message if first time
  if (coachMessages.length === 0) {
    const profile = loadProfile();
    const name = profile.name ? `, ${profile.name}` : '';
    coachMessages.push({
      role: 'system-ui',
      content: `Coach listo${name} · Contexto cargado con tu historial completo`
    });
    renderCoachMessages();
  }

  // Style send button with active day color
  const color = PLAN[activeDay].color;
  const btn = document.getElementById('btn-coach-send');
  if (btn) { btn.style.background = color; btn.style.color = '#000'; }
}

renderDay();
showView("entreno");
renderBottomBar();

</script>
