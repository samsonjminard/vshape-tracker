<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230C0C0F'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🏋️%3C/text%3E%3C/svg%3E">
<title>V-Shape Program</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0C0C0F; color: #fff; font-family: 'Barlow', system-ui, sans-serif; }
  body { max-width: 480px; margin: 0 auto; position: relative; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 0; }
  button { font-family: 'Barlow', system-ui, sans-serif; cursor: pointer; border: none; }
  textarea { font-family: 'Barlow', system-ui, sans-serif; }
  input { font-family: 'Barlow', system-ui, sans-serif; }

  #bg-glow {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 320px; height: 320px; border-radius: 50%;
    pointer-events: none; z-index: 0; transition: background 0.5s;
  }
  #app { position: relative; z-index: 1; padding-bottom: 90px; }

  /* ── MAIN NAV ─────────────────────────────────────────── */
  #main-nav {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px; padding: 20px 20px 0;
  }
  .main-nav-btn {
    border-radius: 14px; padding: 11px 4px; border-width: 1.5px; border-style: solid;
    font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase;
    transition: all 0.2s; background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
  }

  /* ── HEADER ───────────────────────────────────────────── */
  #header { padding: 16px 20px 0; }
  #header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  #day-label-sub { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 4px; }
  #day-label { font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -0.5px; }
  #day-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
  #today-str { font-size: 11px; color: rgba(255,255,255,0.25); text-transform: capitalize; margin-bottom: 8px; text-align: right; }
  #btn-clear {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,71,71,0.08); border: 1px solid rgba(255,71,71,0.2);
    border-radius: 10px; color: rgba(255,110,110,0.7); padding: 8px 12px;
    font-size: 12px; font-weight: 600;
  }
  #btn-clear:hover { background: rgba(255,71,71,0.14); }

  /* ── DAY SELECTOR ─────────────────────────────────────── */
  #day-selector { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 20px; }
  .day-btn { border-radius: 12px; padding: 10px 6px; transition: all 0.2s; border-width: 1.5px; border-style: solid; }
  .day-btn-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.3; text-align: center; }

  /* ── PROGRESS BAR ─────────────────────────────────────── */
  #progress-wrap { margin-bottom: 20px; }
  #progress-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  #progress-lbl { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  #progress-val { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  #progress-track { height: 4px; background: rgba(255,255,255,0.07); border-radius: 100px; overflow: hidden; }
  #progress-bar { height: 100%; border-radius: 100px; transition: width 0.4s ease; }

  /* ── BLOCKS ───────────────────────────────────────────── */
  #blocks { padding: 0 20px; }
  .block-wrap { margin-bottom: 22px; }
  .block-header { margin-bottom: 8px; }
  .ss-badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 100px; padding: 4px 10px; border-width: 1px; border-style: solid; }
  .ss-badge-txt { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
  .block-lbl { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; }
  .block-exercises { border-left-width: 3px; border-left-style: solid; padding-left: 12px; }

  /* ── EXERCISE CARD ────────────────────────────────────── */
  .ex-card { padding: 16px 16px 12px; border-width: 1px; border-style: solid; margin-bottom: 2px; transition: all 0.3s; }
  .ex-card:last-child { margin-bottom: 12px; }
  .ex-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .ex-id-badge { border-radius: 9px; padding: 4px 9px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; border-width: 1.5px; border-style: solid; }
  .ex-name { font-size: 15px; font-weight: 700; line-height: 1.25; }
  .ex-meta { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 2px; }
  .ex-meta span { font-weight: 600; }
  .btn-notes { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.4); padding: 6px 8px; font-size: 13px; flex-shrink: 0; }
  .btn-notes.active { background: rgba(255,255,255,0.1); }
  .notes-textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; font-size: 13px; padding: 10px 12px; margin-bottom: 10px; outline: none; resize: none; line-height: 1.5; display: none; }
  .col-headers { display: grid; grid-template-columns: 34px 1fr 16px 1fr 48px; gap: 8px; margin-bottom: 2px; align-items: center; }
  .col-hdr { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.22); text-align: center; letter-spacing: 1px; text-transform: uppercase; }

  /* ── SET ROW ──────────────────────────────────────────── */
  .set-row { display: grid; grid-template-columns: 34px 1fr 16px 1fr 48px; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05); transition: opacity 0.25s; }
  .set-row.done { opacity: 0.42; }
  .set-num { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; transition: all 0.2s; flex-shrink: 0; background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }
  .set-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.11); border-radius: 10px; color: #fff; font-size: 17px; font-weight: 600; text-align: center; padding: 11px 4px; outline: none; font-family: 'JetBrains Mono', monospace; }
  .set-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .set-sep { color: rgba(255,255,255,0.2); font-size: 15px; text-align: center; }
  .btn-check { width: 48px; height: 44px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-weight: 800; }
  .btn-check svg { pointer-events: none; }
  .done-badge { display: none; align-items: center; gap: 6px; margin-top: 10px; font-size: 12px; font-weight: 700; }

  /* ── TIMER ────────────────────────────────────────────── */
  .timer-wrap { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: rgba(255,255,255,0.04); border-radius: 14px; margin: 10px 0; border-width: 1px; border-style: solid; }
  .timer-svg { flex-shrink: 0; transform: rotate(-90deg); }
  .timer-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .timer-val { font-size: 16px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; }
  .timer-status { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  .btn-skip { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; padding: 10px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }

  /* ── ROUTINE TIMER ────────────────────────────────────── */
  #routine-timer-bar {
    display: none; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04); border-radius: 16px;
    padding: 14px 18px; margin: 14px 20px 0;
    border-width: 1px; border-style: solid; transition: border-color 0.3s;
  }
  #routine-timer-bar.active { display: flex; }
  #rt-icon { font-size: 20px; flex-shrink: 0; }
  #rt-center { flex: 1; }
  #rt-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 2px; }
  #rt-time { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; }
  #rt-status { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; }
  #btn-rt-toggle { border: none; border-radius: 14px; padding: 12px 18px; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; flex-shrink: 0; }

  /* ── PROGRESO VIEW ────────────────────────────────────── */
  #progreso-view { padding: 0 20px; display: none; }
  .prog-day-section { margin-bottom: 32px; }
  .prog-day-title { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .prog-day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .prog-ex-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; margin-bottom: 12px; overflow: hidden; }
  .prog-ex-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .prog-ex-name { font-size: 14px; font-weight: 700; flex: 1; }
  .prog-ex-best { font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 700; padding: 4px 8px; border-radius: 8px; border-width: 1px; border-style: solid; }
  .prog-canvas-wrap { position: relative; width: 100%; }
  canvas.prog-chart { width: 100%; height: 140px; display: block; }
  .prog-stats-row { display: flex; gap: 8px; margin-top: 12px; }
  .prog-stat { flex: 1; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 8px; text-align: center; }
  .prog-stat-val { font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .prog-stat-lbl { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
  .prog-no-data { text-align: center; padding: 60px 20px; }
  .prog-no-data-icon { font-size: 40px; margin-bottom: 12px; }
  .prog-no-data-txt { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .prog-no-data-sub { font-size: 13px; color: rgba(255,255,255,0.25); }

  /* ── SESSION BREAKDOWN ────────────────────────────────── */
  .session-breakdown { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .sess-breakdown-title { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 8px; }
  .sess-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; }
  .sess-date { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; padding-top: 3px; min-width: 52px; }
  .sess-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .set-chip { font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace; padding: 3px 7px; border-radius: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); }
  .set-chip-bw { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }

  /* ── SESSION DURATION CHART ───────────────────────────── */
  .prog-session-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; margin-bottom: 24px; overflow: hidden; }
  .prog-session-title { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  canvas.prog-chart-time { width: 100%; height: 130px; display: block; }

  /* ── DRIVE SYNC ───────────────────────────────────────── */
  #drive-bar { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; }
  #drive-status { flex: 1; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }
  #drive-status.ok { color: #4ade80; }
  #drive-status.err { color: #f87171; }
  #drive-status.syncing { color: #facc15; }
  #drive-error-log { display: none; width: 100%; padding: 8px; background: rgba(248,113,113,0.08); border-top: 1px solid rgba(248,113,113,0.2); font-size: 11px; font-family: monospace; color: #f87171; word-break: break-all; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
  #btn-drive-login { display: flex; align-items: center; gap: 6px; background: rgba(66,133,244,0.15); border: 1px solid rgba(66,133,244,0.4); border-radius: 10px; color: #7ab3ff; padding: 7px 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; }
  #btn-drive-login:hover { background: rgba(66,133,244,0.25); }
  #btn-drive-logout { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.3); padding: 7px 10px; font-size: 10px; font-weight: 600; cursor: pointer; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.2); }
  .sync-dot.ok { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .sync-dot.syncing { background: #facc15; animation: pulse 1s infinite; }
  .sync-dot.err { background: #f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── BOTTOM BAR ───────────────────────────────────────── */
  #bottom-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(12,12,15,0.95); backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 10px 20px 22px;
    display: flex; justify-content: center; align-items: center;
  }
  #bottom-bar-inner { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.25); font-size: 12px; cursor: pointer; border-radius: 8px; padding: 4px 8px; transition: background 0.2s; }
  #bottom-bar-inner:hover { background: rgba(255,255,255,0.06); }
  #bottom-bar-inner:active { background: rgba(255,255,255,0.1); }

  /* ── MODAL ────────────────────────────────────────────── */
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 200; backdrop-filter: blur(4px); }
  #modal-sheet {
    display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: #1a1a22; border-radius: 24px 24px 0 0;
    z-index: 201; padding: 24px 24px 44px; max-height: 85vh; overflow-y: auto;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 100px; margin: 0 auto 24px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; }
  .profile-field { margin-bottom: 14px; }
  .profile-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
  .profile-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: #fff; font-size: 15px; padding: 12px 14px; outline: none; font-family: 'Barlow', sans-serif; }
  .profile-input:focus { border-color: rgba(255,255,255,0.25); }
  .modal-btn-primary { width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 800; letter-spacing: 0.5px; cursor: pointer; margin-top: 8px; }
  .modal-btn-secondary { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 13px; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); cursor: pointer; margin-top: 8px; }

  /* ── PLAN EDITOR ──────────────────────────────────────── */
  #plan-view { display: none; padding: 0 20px 20px; }
  .plan-header { padding: 16px 0 20px; display: flex; justify-content: space-between; align-items: flex-start; }
  .plan-title-sub { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 4px; }
  .plan-title { font-size: 26px; font-weight: 900; }
  .plan-reset-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: rgba(255,255,255,0.4); padding: 8px 12px; font-size: 11px; font-weight: 700; }
  .plan-day-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
  .plan-day-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; }
  .plan-day-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .plan-day-title { font-size: 13px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; flex: 1; }
  .plan-day-sub { font-size: 11px; color: rgba(255,255,255,0.3); }
  .plan-day-chevron { font-size: 12px; color: rgba(255,255,255,0.3); transition: transform 0.2s; }
  .plan-day-body { padding: 0 16px 14px; }
  .plan-block-editor { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .plan-block-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .plan-block-label { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); flex: 1; }
  .plan-control-group { display: flex; align-items: center; gap: 6px; }
  .plan-control-label { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 600; }
  .plan-num-input { width: 60px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; text-align: center; padding: 6px 4px; outline: none; font-family: 'JetBrains Mono', monospace; }
  .plan-ss-toggle { position: relative; width: 38px; height: 22px; cursor: pointer; }
  .plan-ss-toggle input { opacity: 0; width: 0; height: 0; }
  .plan-ss-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 100px; transition: 0.3s; }
  .plan-ss-slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
  .plan-ss-toggle input:checked + .plan-ss-slider { background: rgba(255,165,0,0.5); }
  .plan-ss-toggle input:checked + .plan-ss-slider:before { transform: translateX(16px); background: #FFB300; }
  .plan-ex-row { display: grid; grid-template-columns: 1fr 44px 1fr 32px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .plan-ex-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; font-weight: 600; padding: 8px 10px; outline: none; width: 100%; }
  .plan-ex-input:focus { border-color: rgba(255,255,255,0.25); }
  .plan-ex-remove { width: 32px; height: 32px; background: rgba(255,71,71,0.1); border: 1px solid rgba(255,71,71,0.2); border-radius: 8px; color: rgba(255,110,110,0.7); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; flex-shrink: 0; }
  .plan-add-ex-btn { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.4); padding: 8px 12px; font-size: 12px; font-weight: 600; width: 100%; justify-content: center; margin-top: 4px; cursor: pointer; }

// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
document.addEventListener('touchstart', () => { try { getAudioCtx().resume(); } catch(e){} }, { once: true, passive: true });
document.addEventListener('click', () => { try { getAudioCtx().resume(); } catch(e){} }, { once: true });

function playBeep(times = 3) {
  try {
    const ctx = getAudioCtx();
    ctx.resume();
    for (let i = 0; i < times; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = i === 0 ? 660 : i === 1 ? 880 : 1100;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.22;
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      osc.start(t); osc.stop(t + 0.18);
    }
  } catch(e) {}
}

function playCheckSound() {
  try {
    const ctx = getAudioCtx();
    ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 660;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch { return {}; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} scheduleDriveSync(d); }
function todayStr() { return new Date().toISOString().split("T")[0]; }
function dataKey(dayKey, blockId, exId, date) { return `${date||todayStr()}_${dayKey}_${blockId}_${exId}`; }
function getLastSessionExData(dayKey, blockId, exId) {
  const all = loadData();
  const suffix = `_${dayKey}_${blockId}_${exId}`;
  const today = todayStr();
  let best = null;
  Object.entries(all).forEach(([key, val]) => {
    if (!key.endsWith(suffix)) return;
    const date = key.slice(0, key.length - suffix.length);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
    if (date >= today) return; // skip today or future
    if (!best || date > best.date) best = { date, val };
  });
  return best ? best.val : null;
}

function getExData(dayKey, blockId, exId, numSets) {
  const d = loadData();
  const k = dataKey(dayKey, blockId, exId);
  if (d[k]) return d[k];
  // Pre-fill from last session if available
  const last = getLastSessionExData(dayKey, blockId, exId);
  if (last && last.sets) {
    return {
      sets: last.sets.map(s => ({ weight: s.weight || "", reps: s.reps || "" })),
      completed: Array(numSets).fill(false),
      notes: "",
      prefilled: true
    };
  }
  return { sets: Array.from({length:numSets},()=>({weight:"",reps:""})), completed: Array(numSets).fill(false), notes: "" };
}
function setExData(dayKey, blockId, exId, data) {
  data.lastModified = Date.now();
  const d = loadData();
  d[dataKey(dayKey, blockId, exId)] = data;
  saveData(d);
}

// ═══════════════════════════════════════════════════════════
// HISTORY (ENHANCED WITH PER-SET DETAIL)
// ═══════════════════════════════════════════════════════════
function getExerciseHistory(dayKey, blockId, exId) {
  const all = loadData();
  const suffix = `_${dayKey}_${blockId}_${exId}`;
  const history = [];
  Object.entries(all).forEach(([key, val]) => {
    if (!key.endsWith(suffix)) return;
    const date = key.slice(0, key.length - suffix.length);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
    if (!val.completed || !val.sets) return;

    const completedSets = val.sets
      .map((s, i) => val.completed[i] ? { weight: parseFloat(s.weight)||0, reps: parseFloat(s.reps)||0 } : null)
      .filter(Boolean);

    if (completedSets.length === 0) return;

    const weights = completedSets.map(s => s.weight).filter(w => w > 0);
    const isBodyweight = weights.length === 0;

    const totalReps = completedSets.reduce((s, x) => s + x.reps, 0);
    const maxReps = Math.max(0, ...completedSets.map(s => s.reps));

    if (isBodyweight) {
      history.push({ date, isBodyweight: true, totalReps, maxReps, sets: completedSets, maxWeight: 0, avgWeight: 0, totalVol: 0 });
    } else {
      const maxW = Math.max(...weights);
      const avgW = weights.reduce((a,b)=>a+b,0) / weights.length;
      const totalVol = completedSets.reduce((s, x) => s + (x.weight||0) * x.reps, 0);
      history.push({ date, isBodyweight: false, maxWeight: maxW, avgWeight: parseFloat(avgW.toFixed(1)), totalVol: parseFloat(totalVol.toFixed(0)), totalReps, maxReps, sets: completedSets });
    }
  });
  history.sort((a,b) => a.date.localeCompare(b.date));
  return history;
}

function getSessionHistory(dayKey) {
  const all = loadData();
  const prefix = 'session_' + dayKey.replace(/ /g,'_') + '_';
  const history = [];
  Object.entries(all).forEach(([key, val]) => {
    if (!key.startsWith(prefix)) return;
    if (val.durationSecs && val.date) history.push({ date: val.date, durationSecs: val.durationSecs });
  });
  history.sort((a,b) => a.date.localeCompare(b.date));
  return history;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  return d.toLocaleDateString("es-ES", { day: "numeric", month: "short" });
}

// ═══════════════════════════════════════════════════════════
// SESSION BREAKDOWN HTML
// ═══════════════════════════════════════════════════════════
function renderSessionBreakdown(history, color, isBodyweight) {
  if (history.length === 0) return '';
  const recent = [...history].reverse().slice(0, 1);
  let html = `<div class="session-breakdown"><div class="sess-breakdown-title">Detalle por sesión</div>`;
  recent.forEach(h => {
    html += `<div class="sess-row"><span class="sess-date">${formatDate(h.date)}</span><div class="sess-chips">`;
    if (isBodyweight) {
      h.sets.forEach(s => {
        html += `<span class="set-chip set-chip-bw">${s.reps||'?'}r</span>`;
      });
    } else {
      h.sets.forEach(s => {
        const wStr = s.weight > 0 ? `${s.weight}` : 'BW';
        const rStr = s.reps > 0 ? `×${s.reps}` : '';
        html += `<span class="set-chip">${wStr}${rStr}</span>`;
      });
    }
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
// CHART DRAWING
// ═══════════════════════════════════════════════════════════
function drawChart(canvas, history, color, isBodyweight) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight || 140;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const pad = { top: 14, right: 16, bottom: 32, left: 42 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const vals = isBodyweight ? history.map(h => h.totalReps) : history.map(h => h.maxWeight);
  const minV = Math.max(0, Math.min(...vals) * 0.88);
  const maxV = Math.max(...vals) * 1.08;
  const range = maxV - minV || 1;
  const xOf = i => pad.left + (i / (history.length - 1 || 1)) * cw;
  const yOf = v => pad.top + ch - ((v - minV) / range) * ch;

  // Grid
  ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    const gv = maxV - (range / 3) * i;
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.font = `600 9px 'JetBrains Mono', monospace`;
    ctx.textAlign = "right";
    ctx.fillText(isBodyweight ? Math.round(gv) + 'r' : gv.toFixed(0) + 'kg', pad.left - 5, y + 4);
  }

  if (history.length < 2) {
    const x = xOf(0), y = yOf(vals[0]);
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = `700 10px 'Barlow', sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(formatDate(history[0].date), x, H - 8);
    return;
  }

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, hex2rgb(color, 0.22)); grad.addColorStop(1, hex2rgb(color, 0.0));
  ctx.beginPath(); ctx.moveTo(xOf(0), yOf(vals[0]));
  for (let i = 1; i < history.length; i++) {
    const x0=xOf(i-1),y0=yOf(vals[i-1]),x1=xOf(i),y1=yOf(vals[i]),cpx=(x0+x1)/2;
    ctx.bezierCurveTo(cpx,y0,cpx,y1,x1,y1);
  }
  ctx.lineTo(xOf(history.length-1), pad.top+ch); ctx.lineTo(xOf(0), pad.top+ch);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.moveTo(xOf(0), yOf(vals[0]));
  for (let i = 1; i < history.length; i++) {
    const x0=xOf(i-1),y0=yOf(vals[i-1]),x1=xOf(i),y1=yOf(vals[i]),cpx=(x0+x1)/2;
    ctx.bezierCurveTo(cpx,y0,cpx,y1,x1,y1);
  }
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = "round"; ctx.stroke();

  // Points + labels
  history.forEach((h, i) => {
    const x = xOf(i), y = yOf(vals[i]);
    ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fillStyle = hex2rgb(color,0.2); ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fillStyle = "#0C0C0F"; ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = `700 9px 'JetBrains Mono', monospace`; ctx.textAlign = "center";
    ctx.fillText(isBodyweight ? vals[i]+'r' : vals[i]+'kg', x, y - 11);
    ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.font = `600 9px 'Barlow', sans-serif`;
    ctx.fillText(formatDate(h.date), x, H - 6);
  });
}

// series = [{ history: [{date, durationSecs}], color, label }]
function drawMultiTimeChart(canvas, series) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight || 160;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);

  // Build sorted list of all unique dates across all series
  const dateSet = new Set();
  series.forEach(s => s.history.forEach(h => dateSet.add(h.date)));
  const allDates = [...dateSet].sort();
  if (allDates.length === 0) return;

  const pad = { top: 18, right: 16, bottom: 32, left: 46 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  // Global Y range across all series
  let allVals = [];
  series.forEach(s => s.history.forEach(h => allVals.push(h.durationSecs)));
  const minV = Math.max(0, Math.min(...allVals) * 0.85);
  const maxV = Math.max(...allVals) * 1.1;
  const range = maxV - minV || 1;

  const xOf = dateStr => pad.left + (allDates.indexOf(dateStr) / (allDates.length - 1 || 1)) * cw;
  const yOf = v => pad.top + ch - ((v - minV) / range) * ch;

  // Grid lines + Y labels
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    const gv = maxV - (range / 3) * i, gm = Math.floor(gv / 60), gs = Math.floor(gv % 60);
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.font = "600 9px 'JetBrains Mono', monospace";
    ctx.textAlign = 'right';
    ctx.fillText(gm + ':' + String(gs).padStart(2,'0'), pad.left - 5, y + 4);
  }

  // X axis date labels (show up to 5 evenly spaced)
  const labelStep = Math.max(1, Math.floor(allDates.length / 5));
  ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = "600 9px 'Barlow', sans-serif"; ctx.textAlign = 'center';
  allDates.forEach((d, i) => {
    if (i % labelStep === 0 || i === allDates.length - 1) {
      ctx.fillText(formatDate(d), xOf(d), H - 6);
    }
  });

  // Draw each series
  series.forEach(({ history, color }) => {
    if (history.length === 0) return;
    const pts = history.map(h => ({ x: xOf(h.date), y: yOf(h.durationSecs), val: h.durationSecs }));

    // Gradient fill
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    grad.addColorStop(0, hex2rgb(color, 0.12)); grad.addColorStop(1, hex2rgb(color, 0.0));
    if (pts.length >= 2) {
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const cpx = (pts[i-1].x + pts[i].x) / 2;
        ctx.bezierCurveTo(cpx, pts[i-1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
      }
      ctx.lineTo(pts[pts.length-1].x, pad.top + ch); ctx.lineTo(pts[0].x, pad.top + ch);
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

      // Line
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const cpx = (pts[i-1].x + pts[i].x) / 2;
        ctx.bezierCurveTo(cpx, pts[i-1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
      }
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();
    }

    // Dots + value labels (only last point to keep it clean)
    pts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fillStyle = hex2rgb(color, 0.2); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fillStyle = '#0C0C0F'; ctx.fill();
      // Show value label only on last point
      if (i === pts.length - 1) {
        const m = Math.floor(p.val / 60), s = p.val % 60;
        ctx.fillStyle = color; ctx.font = "700 9px 'JetBrains Mono', monospace"; ctx.textAlign = 'center';
        ctx.fillText(m + ':' + String(s).padStart(2,'0'), p.x, p.y - 10);
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════
const _celebratedKeys = new Set();

function celebrate(color) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  document.body.appendChild(canvas);
  const W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const cols = [color, '#ffffff', '#ffb300', '#4ade80'];
  const particles = Array.from({length:70}, () => ({
    x: Math.random()*W, y: Math.random()*H - H,
    r: Math.random()*5+3, d: Math.random()*30+10,
    col: cols[Math.floor(Math.random()*cols.length)],
    tiltAngle: 0, tiltInc: Math.random()*0.07+0.04
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      p.tiltAngle += p.tiltInc;
      p.y += Math.cos(frame/15+p.d) + p.d/8;
      p.tilt = Math.sin(p.tiltAngle)*13;
      ctx.beginPath(); ctx.lineWidth = p.r;
      ctx.strokeStyle = p.col;
      ctx.moveTo(p.x+p.tilt+p.r/4, p.y);
      ctx.lineTo(p.x+p.tilt, p.y+p.tilt+p.r/4);
      ctx.stroke();
      if (p.y > H+20) { p.x = Math.random()*W; p.y = -20; }
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
  showToast('🎉 ¡Rutina completada!', color);
}

function checkAndCelebrate() {
  const key = `${activeDay}_${todayStr()}`;
  if (_celebratedKeys.has(key)) return;
  const day = PLAN[activeDay];
  const d = loadData();
  let total = 0, done = 0;
  day.blocks.forEach(b => b.exercises.forEach(e => {
    const entry = d[dataKey(activeDay, b.id, e.id)];
    total += e.sets;
    if (entry?.completed) done += entry.completed.filter(Boolean).length;
  }));
  if (total > 0 && done === total) {
    _celebratedKeys.add(key);
    setTimeout(() => celebrate(PLAN[activeDay].color), 400);
  }
}

const EX_LINE_COLORS = ['#60a5fa','#f472b6','#34d399','#fbbf24','#a78bfa','#fb923c','#22d3ee','#f87171'];

// series = [{name, id, history:[{date, maxWeight}]}, ...]
function drawDayProgressChart(canvas, series) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight || 170;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);

  // Collect all unique dates across series that have weight data
  const dateSet = new Set();
  series.forEach(s => s.history.forEach(h => { if (h.maxWeight > 0) dateSet.add(h.date); }));
  const allDates = [...dateSet].sort();
  if (!allDates.length) {
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = "600 12px 'Barlow', sans-serif";
    ctx.textAlign = 'center'; ctx.fillText('Solo ejercicios sin peso registrados', W/2, H/2); return;
  }

  const pad = { top: 16, right: 16, bottom: 28, left: 44 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

  // Global Y range
  let allW = [];
  series.forEach(s => s.history.forEach(h => { if (h.maxWeight > 0) allW.push(h.maxWeight); }));
  const minV = Math.max(0, Math.min(...allW) * 0.88);
  const maxV = Math.max(...allW) * 1.1;
  const range = maxV - minV || 1;

  const xOf = date => pad.left + (allDates.indexOf(date) / (allDates.length - 1 || 1)) * cw;
  const yOf = v => pad.top + ch - ((v - minV) / range) * ch;

  // Grid lines + Y labels
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    const gv = maxV - (range / 3) * i;
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.font = "600 9px 'JetBrains Mono', monospace";
    ctx.textAlign = 'right'; ctx.fillText(gv.toFixed(0) + 'kg', pad.left - 5, y + 4);
  }

  // X axis date labels (max 5)
  const step = Math.max(1, Math.floor(allDates.length / 5));
  ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.font = "600 8px 'Barlow', sans-serif"; ctx.textAlign = 'center';
  allDates.forEach((d, i) => {
    if (i % step === 0 || i === allDates.length - 1) ctx.fillText(formatDate(d), xOf(d), H - 5);
  });

  // Draw each exercise line
  series.forEach((s, si) => {
    const color = s.color;
    const pts = s.history.filter(h => h.maxWeight > 0).map(h => ({ x: xOf(h.date), y: yOf(h.maxWeight), val: h.maxWeight }));
    if (!pts.length) return;

    // Fill gradient
    if (pts.length >= 2) {
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      grad.addColorStop(0, hex2rgb(color, 0.10)); grad.addColorStop(1, hex2rgb(color, 0.0));
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const cpx = (pts[i-1].x + pts[i].x) / 2;
        ctx.bezierCurveTo(cpx, pts[i-1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
      }
      ctx.lineTo(pts[pts.length-1].x, pad.top+ch); ctx.lineTo(pts[0].x, pad.top+ch);
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const cpx = (pts[i-1].x + pts[i].x) / 2;
        ctx.bezierCurveTo(cpx, pts[i-1].y, cpx, pts[i].y, pts[i].x, pts[i].y);
      }
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();
    }

    // Dots
    pts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fillStyle = hex2rgb(color, 0.18); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fillStyle = '#0C0C0F'; ctx.fill();
      // Value label on last point only
      if (i === pts.length - 1) {
        ctx.fillStyle = color; ctx.font = "700 9px 'JetBrains Mono', monospace"; ctx.textAlign = 'center';
        ctx.fillText(p.val + 'kg', p.x, p.y - 9);
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════
// 1RM ESTIMATION (Epley)
// ═══════════════════════════════════════════════════════════
function estimateOneRM(weight, reps) {
  if (!weight || !reps || reps <= 0) return 0;
  if (reps === 1) return weight;
  return parseFloat((weight * (1 + reps / 30)).toFixed(1));
}
function getBestOneRM(dayKey, blockId, exId) {
  const history = getExerciseHistory(dayKey, blockId, exId);
  let best = 0;
  history.forEach(h => {
    h.sets.forEach(s => {
      const orm = estimateOneRM(s.weight, s.reps);
      if (orm > best) best = orm;
    });
  });
  return best;
}

// ═══════════════════════════════════════════════════════════
// PROGRESSION SUGGESTION
// ═══════════════════════════════════════════════════════════
function getSuggestion(dayKey, blockId, exId, targetRepsLabel) {
  const last = getLastSessionExData(dayKey, blockId, exId);
  if (!last || !last.sets) return null;
  const completedSets = last.sets.filter((s, i) => last.completed && last.completed[i]);
  if (!completedSets.length || completedSets.length < last.sets.length) return null;
  const weights = completedSets.map(s => parseFloat(s.weight)).filter(w => w > 0);
  const reps = completedSets.map(s => parseFloat(s.reps)).filter(r => r > 0);
  if (!weights.length || !reps.length) return null;
  const avgW = weights.reduce((a,b)=>a+b,0)/weights.length;
  const avgR = reps.reduce((a,b)=>a+b,0)/reps.length;
  // Extract minimum target reps from label (e.g. "10-12" → 10, "8" → 8, "Fallo" → skip)
  const targetMatch = targetRepsLabel.match(/(\d+)/);
  const targetMin = targetMatch ? parseInt(targetMatch[1]) : null;
  if (!targetMin) return null;
  if (avgR >= targetMin) {
    return { suggestWeight: parseFloat((avgW + 2.5).toFixed(1)), lastWeight: avgW, lastReps: Math.round(avgR) };
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// PR DETECTION
// ═══════════════════════════════════════════════════════════
function getAllTimeMaxWeight(dayKey, blockId, exId) {
  const all = loadData();
  const suffix = `_${dayKey}_${blockId}_${exId}`;
  const today = todayStr();
  let maxW = 0;
  Object.entries(all).forEach(([key, val]) => {
    if (!key.endsWith(suffix)) return;
    const date = key.slice(0, key.length - suffix.length);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || date >= today) return;
    if (!val.sets) return;
    val.sets.forEach((s, i) => {
      if (val.completed && val.completed[i]) {
        const w = parseFloat(s.weight) || 0;
        if (w > maxW) maxW = w;
      }
    });
  });
  return maxW;
}

// ═══════════════════════════════════════════════════════════
// WEEKLY VOLUME HISTORY
// ═══════════════════════════════════════════════════════════
function getWeeklyVolumeHistory(dayKey) {
  const all = loadData();
  const day = PLAN[dayKey];
  const weeks = {};
  day.blocks.forEach(block => {
    block.exercises.forEach(ex => {
      const suffix = `_${dayKey}_${block.id}_${ex.id}`;
      Object.entries(all).forEach(([key, val]) => {
        if (!key.endsWith(suffix)) return;
        const date = key.slice(0, key.length - suffix.length);
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
        if (!val.completed || !val.sets) return;
        const d = new Date(date + 'T12:00:00');
        const dow = d.getDay();
        const diff = dow === 0 ? -6 : 1 - dow;
        const mon = new Date(d); mon.setDate(d.getDate() + diff);
        const wk = mon.toISOString().split('T')[0];
        if (!weeks[wk]) weeks[wk] = 0;
        val.sets.forEach((s, i) => {
          if (val.completed[i]) weeks[wk] += (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0);
        });
      });
    });
  });
  return Object.entries(weeks)
    .map(([week, vol]) => ({ week, vol: Math.round(vol) }))
    .sort((a, b) => a.week.localeCompare(b.week));
}

function drawWeeklyVolumeChart(canvas, weeklyData, color) {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight || 130;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const pad = { top: 14, right: 16, bottom: 28, left: 52 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  const vals = weeklyData.map(w => w.vol);
  const maxV = Math.max(...vals) * 1.12 || 1;
  const xOf = i => pad.left + (i / (weeklyData.length - 1 || 1)) * cw;
  const yOf = v => pad.top + ch - (v / maxV) * ch;

  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (ch / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    const gv = maxV - (maxV / 3) * i;
    ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.font = "600 9px 'JetBrains Mono', monospace";
    ctx.textAlign = 'right';
    ctx.fillText(gv >= 1000 ? (gv/1000).toFixed(1)+'t' : Math.round(gv)+'kg', pad.left - 5, y + 4);
  }

  if (weeklyData.length === 1) {
    const bW = 40, x = W / 2 - bW / 2, y = yOf(vals[0]);
    ctx.fillStyle = hex2rgb(color, 0.7); ctx.beginPath(); ctx.roundRect(x, y, bW, pad.top+ch-y, 4); ctx.fill();
    return;
  }

  // Bars
  const barW = Math.max(4, Math.min(28, cw / weeklyData.length - 6));
  weeklyData.forEach((w, i) => {
    const x = xOf(i) - barW / 2, y = yOf(w.vol), h = pad.top + ch - y;
    const isLast = i === weeklyData.length - 1;
    const grad = ctx.createLinearGradient(0, y, 0, pad.top + ch);
    grad.addColorStop(0, hex2rgb(color, isLast ? 0.85 : 0.45));
    grad.addColorStop(1, hex2rgb(color, isLast ? 0.35 : 0.15));
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(x, y, barW, h, [4, 4, 0, 0]); ctx.fill();
    if (isLast) {
      ctx.fillStyle = color; ctx.font = "700 9px 'JetBrains Mono', monospace"; ctx.textAlign = 'center';
      ctx.fillText(w.vol >= 1000 ? (w.vol/1000).toFixed(1)+'t' : w.vol+'kg', xOf(i), y - 5);
    }
    // Week label (only show first and last)
    if (i === 0 || isLast) {
      const d = new Date(w.week + 'T12:00:00');
      ctx.fillStyle = 'rgba(255,255,255,0.28)'; ctx.font = "600 8px 'Barlow', sans-serif"; ctx.textAlign = 'center';
      ctx.fillText(d.toLocaleDateString('es-ES', {day:'numeric',month:'short'}), xOf(i), H - 5);
    }
  });
}

// WEEK DOTS
// ═══════════════════════════════════════════════════════════
function renderWeekDots() {
  const labels = ['L','M','X','J','V','S','D'];
  const today = new Date();
  const dow = today.getDay();
  const monOffset = dow === 0 ? -6 : 1 - dow;
  const allData = loadData();
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + monOffset + i);
    const dateStr = d.toISOString().split('T')[0];
    const isToday = dateStr === todayStr();
    let trainedColor = null;
    DAY_ORDER.forEach(dk => {
      const prefix = 'session_' + dk.replace(/ /g,'_') + '_';
      if (allData[prefix + dateStr]) trainedColor = PLAN[dk].color;
    });
    const circleStyle = trainedColor
      ? `background:${trainedColor};border-color:${trainedColor};box-shadow:0 0 7px ${hex2rgb(trainedColor,0.5)};color:#000`
      : '';
    html += `<div class="wdot-item${isToday?' wdot-today':''}">
      <div class="wdot-circle" style="${circleStyle}">${trainedColor ? '✓' : (isToday ? '◦' : '')}</div>
      <div class="wdot-label">${labels[i]}</div>
    </div>`;
  }
  const el = document.getElementById('week-dots');
  if (el) el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// NEXT SESSION BAR
// ═══════════════════════════════════════════════════════════
function renderNextSessionBar() {
  const allData = loadData();
  const today = todayStr();
  const lastDates = {};
  DAY_ORDER.forEach(dayKey => {
    const prefix = 'session_' + dayKey.replace(/ /g,'_') + '_';
    let last = null;
    Object.keys(allData).forEach(k => {
      if (!k.startsWith(prefix)) return;
      const date = k.replace(prefix, '');
      if (/^\d{4}-\d{2}-\d{2}$/.test(date) && (!last || date > last)) last = date;
    });
    if (last) lastDates[dayKey] = last;
  });
  const bar = document.getElementById('next-session-bar');
  if (!bar || !Object.keys(lastDates).length) { if (bar) bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  let html = `<span class="nsess-lbl">Descansado</span>`;
  DAY_ORDER.forEach(dayKey => {
    if (!(dayKey in lastDates)) return;
    const days = Math.floor((new Date(today) - new Date(lastDates[dayKey])) / 86400000);
    const color = PLAN[dayKey].color;
    const urgency = days >= 7 ? '#f87171' : days >= 5 ? '#fbbf24' : color;
    const short = PLAN[dayKey].label.replace('TORSO ','T').replace('PIERNA ','P');
    html += `<span class="nsess-chip" style="background:${hex2rgb(urgency,0.1)};border-color:${hex2rgb(urgency,0.28)};color:${urgency}">${short} · ${days}d</span>`;
  });
  bar.innerHTML = html;
}

function saveRpe(dayKey, blockId, exId, setIdx, numSets, val) {
  const data = getExData(dayKey, blockId, exId, numSets);

  data.sets[setIdx].rpe = val;
  setExData(dayKey, blockId, exId, data);
}

// ═══════════════════════════════════════════════════════════
// SS ROUND UPDATER
// ═══════════════════════════════════════════════════════════
function updateSSRound(dayKey, blockId, block) {
  const el = document.getElementById(`ss-round-${dayKey}-${blockId}`);
  if (!el) return;
  const numSets = block.exercises[0].sets;
  let minDone = numSets;
  block.exercises.forEach(ex => {
    const data = getExData(dayKey, blockId, ex.id, numSets);
    const done = data.completed.filter(Boolean).length;
    if (done < minDone) minDone = done;
  });
  const currentRound = Math.min(minDone + 1, numSets);
  const allDone = block.exercises.every(ex => getExData(dayKey, blockId, ex.id, numSets).completed.every(Boolean));
  if (allDone) {
    el.textContent = `✓ ${numSets}/${numSets}`;
    el.classList.add('active');
  } else {
    el.textContent = `${currentRound}/${numSets}`;
    el.classList.toggle('active', currentRound > 1);
  }
}

// ═══════════════════════════════════════════════════════════
// ROUTINE TIMER
// ═══════════════════════════════════════════════════════════
let routineStartTime = null, routineInterval = null;

function fmtDuration(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startRoutine() {
  if (routineInterval) return;
  routineStartTime = Date.now();
  const color = PLAN[activeDay].color;
  const bar = document.getElementById('routine-timer-bar');
  bar.classList.add('active'); bar.style.borderColor = hex2rgb(color,0.3);
  document.getElementById('rt-time').style.color = color;
  document.getElementById('btn-start-routine').style.display = 'none';
  const finBtn = document.getElementById('btn-rt-finish');
  finBtn.style.background = hex2rgb(color,0.15); finBtn.style.color = color;
  finBtn.style.border = '1.5px solid ' + hex2rgb(color,0.4);
  routineInterval = setInterval(() => {
    document.getElementById('rt-time').textContent = fmtDuration(Math.floor((Date.now()-routineStartTime)/1000));
  }, 1000);
}

function finishRoutine() {
  if (!routineStartTime) return;
  clearInterval(routineInterval); routineInterval = null;
  const elapsed = Math.floor((Date.now()-routineStartTime)/1000);
  routineStartTime = null;
  const d = loadData();
  const key = 'session_' + activeDay.replace(/ /g,'_') + '_' + todayStr();
  d[key] = { date: todayStr(), day: activeDay, durationSecs: elapsed };
  saveData(d);
  const bar = document.getElementById('routine-timer-bar');
  bar.classList.remove('active');
  document.getElementById('rt-time').textContent = '00:00';
  document.getElementById('btn-start-routine').style.display = 'flex';
  showToast('Sesión guardada · ' + fmtDuration(elapsed), PLAN[activeDay].color);
  renderWeekDots();
  renderNextSessionBar();
}

function resetRoutineTimer() {
  if (routineInterval) { clearInterval(routineInterval); routineInterval = null; }
  routineStartTime = null;
  const bar = document.getElementById('routine-timer-bar');
  if (bar) bar.classList.remove('active');
  const rt = document.getElementById('rt-time'); if (rt) rt.textContent = '00:00';
  const startBtn = document.getElementById('btn-start-routine');
  if (startBtn) startBtn.style.display = 'flex';
}

function showToast(msg, color) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div'); toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;transition:opacity 0.4s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.background = hex2rgb(color,0.18);
  toast.style.border = '1px solid ' + hex2rgb(color,0.4);
  toast.style.color = color;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// ═══════════════════════════════════════════════════════════
// REST TIMER (IMPROVED: DOM UPDATES, BEEP ON END)
// ═══════════════════════════════════════════════════════════
const timers = {};

function startTimer(timerKey, duration, color, containerId) {
  if (timers[timerKey]) { clearInterval(timers[timerKey].interval); }
  const container = document.getElementById(containerId);
  if (!container) return;
  timers[timerKey] = { remaining: duration, duration };
  const rv = 26, circ = 2 * Math.PI * rv;

  container.style.display = 'flex'; container.style.borderColor = hex2rgb(color,0.2);
  container.innerHTML = `
    <svg class="timer-svg" width="66" height="66" aria-hidden="true">
      <circle cx="33" cy="33" r="${rv}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
      <circle id="tarc-${timerKey}" cx="33" cy="33" r="${rv}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${circ} ${circ}" stroke-linecap="round"/>
      <text id="tsvg-${timerKey}" x="33" y="33" text-anchor="middle" dominant-baseline="central" fill="${color}"
        font-size="13" font-weight="700" font-family="monospace"
        style="transform:rotate(90deg);transform-origin:33px 33px">${duration}s</text>
    </svg>
    <div style="flex:1">
      <div class="timer-label">DESCANSO</div>
      <div id="tval-${timerKey}" class="timer-val">${duration}s restantes</div>
      <div class="timer-status">Recuperando…</div>
    </div>
    <button class="btn-skip" onclick="skipTimer('${timerKey}','${containerId}')" aria-label="Saltar descanso">
      ${SVG_SKIP} Skip
    </button>`;

  timers[timerKey].interval = setInterval(() => {
    const t = timers[timerKey]; if (!t) return;
    t.remaining--;
    if (t.remaining <= 0) {
      clearInterval(t.interval); delete timers[timerKey];
      const c = document.getElementById(containerId);
      if (c) { c.style.display = 'none'; c.innerHTML = ''; }
      playBeep();
      return;
    }
    const arc = document.getElementById(`tarc-${timerKey}`);
    const val = document.getElementById(`tval-${timerKey}`);
    const svgTxt = document.getElementById(`tsvg-${timerKey}`);
    const dash = (t.remaining / t.duration) * circ;
    if (arc) arc.setAttribute('stroke-dasharray', `${dash} ${circ}`);
    if (val) val.textContent = `${t.remaining}s restantes`;
    if (svgTxt) svgTxt.textContent = `${t.remaining}s`;
  }, 1000);
}

function skipTimer(timerKey, containerId) {
  if (timers[timerKey]) { clearInterval(timers[timerKey].interval); delete timers[timerKey]; }
  const c = document.getElementById(containerId);
  if (c) { c.style.display = 'none'; c.innerHTML = ''; }
}

// ═══════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════
function updateProgress() {
  const day = PLAN[activeDay]; const d = loadData();
  let total = 0, done = 0;
  day.blocks.forEach(b => b.exercises.forEach(e => {
    const entry = d[dataKey(activeDay, b.id, e.id)];
    total += e.sets;
    if (entry?.completed) done += entry.completed.filter(Boolean).length;
  }));
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const color = day.color;
  document.getElementById("progress-val").textContent = `${done}/${total} series · ${pct}%`;
  document.getElementById("progress-val").style.color = color;
  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("progress-bar").style.background = color;
  document.getElementById("progress-bar").style.boxShadow = `0 0 8px ${hex2rgb(color,0.5)}`;
}

const SVG_CHECK_SM = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

// ═══════════════════════════════════════════════════════════
// CHECK SET
// ═══════════════════════════════════════════════════════════
function handleCheck(btn) {
  const { day: dayKey, block: blockId, ex: exId, set: setIdx, numsets: numSets, rest: restDuration, color, iss: isSS, exids: blockExIds } = btn.dataset;
  checkSet(dayKey, blockId, exId, parseInt(setIdx), parseInt(numSets), parseInt(restDuration), color, isSS==="true", blockExIds.split(','));
}

function checkSet(dayKey, blockId, exId, setIdx, numSets, restDuration, color, isSS, blockExIds) {
  const prMaxBefore = getAllTimeMaxWeight(dayKey, blockId, exId);
  const data = getExData(dayKey, blockId, exId, numSets);
  for (let i = 0; i < numSets; i++) {
    const wEl = document.getElementById(`inp-w-${dayKey}-${blockId}-${exId}-${i}`);
    const rEl = document.getElementById(`inp-r-${dayKey}-${blockId}-${exId}-${i}`);
    const rpeEl = document.getElementById(`inp-rpe-${dayKey}-${blockId}-${exId}-${i}`);
    if (wEl) data.sets[i].weight = wEl.value;
    if (rEl) data.sets[i].reps = rEl.value;
    if (rpeEl) data.sets[i].rpe = rpeEl.value;
  }
  data.completed[setIdx] = true;
  data.prefilled = false;
  setExData(dayKey, blockId, exId, data);
  renderSetRow(dayKey, blockId, exId, setIdx, data, color);
  playCheckSound();

  // PR detection
  const thisWeight = parseFloat(data.sets[setIdx]?.weight) || 0;
  if (thisWeight > 0 && thisWeight > prMaxBefore) {
    setTimeout(() => showToast(`🏆 ¡Nuevo récord! ${thisWeight}kg en ${exId}`, '#FFD700'), 200);
  }

  // SS: check all exercises done this round
  if (isSS) {
    const allRoundDone = blockExIds.every(eid => {
      const d = getExData(dayKey, blockId, eid, numSets);
      return d.completed[setIdx] === true;
    });
    if (allRoundDone) startTimer(`timer-block-${dayKey}-${blockId}-${setIdx}`, restDuration, color, `timerbox-block-${dayKey}-${blockId}`);
    // Update round badge
    const block = PLAN[dayKey].blocks.find(b => b.id === blockId);
    if (block) updateSSRound(dayKey, blockId, block);
  } else {
    startTimer(`timer-${dayKey}-${blockId}-${exId}-${setIdx}`, restDuration, color, `timerbox-block-${dayKey}-${blockId}`);
  }

  if (data.completed.every(Boolean)) {
    const badge = document.getElementById(`done-badge-${dayKey}-${blockId}-${exId}`);
    if (badge) badge.style.display = "flex";
    const card = document.getElementById(`ex-card-${dayKey}-${blockId}-${exId}`);
    if (card) { card.style.background = "rgba(255,255,255,0.02)"; card.style.borderColor = "rgba(255,255,255,0.06)"; }
  }
  updateProgress();
  checkAndCelebrate();
}

function renderSetRow(dayKey, blockId, exId, setIdx, data, color) {
  const done = data.completed[setIdx];
  const row = document.getElementById(`set-row-${dayKey}-${blockId}-${exId}-${setIdx}`);
  if (!row) return;
  row.className = "set-row" + (done ? " done" : "");
  const numEl = row.querySelector(".set-num");
  const prMax = done ? getAllTimeMaxWeight(dayKey, blockId, exId) : 0;
  const thisW = parseFloat(data.sets[setIdx]?.weight) || 0;
  const isPR = done && prMax > 0 && thisW > prMax;
  if (done) {
    numEl.innerHTML = isPR ? '🏆' : SVG_CHECK_SM;
    numEl.style.cssText = `width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all 0.2s;flex-shrink:0;color:${isPR?'#FFD700':color};border:1.5px solid ${isPR?'#FFD700':color};background:${isPR?'rgba(255,215,0,0.12)':hex2rgb(color,0.12)}`;
  } else {
    numEl.textContent = setIdx+1;
    numEl.style.cssText = `width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;transition:all 0.2s;flex-shrink:0;color:rgba(255,255,255,0.4);border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.07)`;
  }
  const wInp = row.querySelector(".inp-w");
  const rInp = row.querySelector(".inp-r");
  const rpeInp = row.querySelector(".rpe-input");
  const btn = row.querySelector(".btn-check");
  if (wInp) wInp.disabled = done;
  if (rInp) rInp.disabled = done;
  if (rpeInp) rpeInp.disabled = done;
  if (btn) {
    btn.style.background = done ? hex2rgb(color,0.1) : color;
    btn.style.color = done ? color : "#000";
    btn.style.boxShadow = done ? "none" : `0 3px 12px ${hex2rgb(color,0.27)}`;
    btn.style.cursor = done ? "default" : "pointer";
    btn.disabled = done;
  }
}

function toggleNotes(dayKey, blockId, exId) {
  const ta = document.getElementById(`notes-${dayKey}-${blockId}-${exId}`);
  const btn = document.getElementById(`btn-notes-${dayKey}-${blockId}-${exId}`);

}
function saveNote(dayKey, blockId, exId, numSets, val) {

}

// ═══════════════════════════════════════════════════════════
// RENDER EXERCISE CARD
// ═══════════════════════════════════════════════════════════
function renderExerciseCard(ex, block, dayKey, color, isSS, isFirst, isLast) {
  const data = getExData(dayKey, block.id, ex.id, ex.sets);
  const allDone = data.completed.every(Boolean);
  let br;
  if (!isSS) br = "18px";
  else if (isFirst && isLast) br = "18px";
  else if (isFirst) br = "18px 18px 4px 4px";
  else if (isLast) br = "4px 4px 18px 18px";
  else br = "4px";

  const cardBg = allDone ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.045)";
  const cardBorder = allDone ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.1)";
  const idColor = allDone ? "rgba(255,255,255,0.25)" : color;
  const idBg = allDone ? "rgba(255,255,255,0.05)" : hex2rgb(color,0.13);
  const idBorder = allDone ? "rgba(255,255,255,0.1)" : color;
  const nameColor = allDone ? "rgba(255,255,255,0.35)" : "#fff";
  const repsColor = allDone ? "rgba(255,255,255,0.2)" : color;

  // Suggestion chip
  const suggestion = getSuggestion(dayKey, block.id, ex.id, ex.repsLabel);
  const suggestionHtml = suggestion && !allDone
    ? `<div class="suggest-chip">💡 Prueba <strong>${suggestion.suggestWeight}kg</strong> hoy · último: ${suggestion.lastWeight}kg × ${suggestion.lastReps} reps</div>`
    : '';

  // PR tracking: all-time max weight from previous sessions
  const prMax = getAllTimeMaxWeight(dayKey, block.id, ex.id);

  let setRowsHTML = "";
  for (let i = 0; i < ex.sets; i++) {
    const done = data.completed[i];
    const w = data.sets[i]?.weight||"", r = data.sets[i]?.reps||"", rpe = data.sets[i]?.rpe||"";
    const isPR = done && prMax > 0 && parseFloat(w) > prMax;
    const numStyle = done
      ? `color:${isPR?'#FFD700':color};border-color:${isPR?'#FFD700':color};background:${isPR?'rgba(255,215,0,0.12)':hex2rgb(color,0.12)}`
      : `color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.07)`;
    const btnBg = done ? hex2rgb(color,0.1) : color;
    const btnColor = done ? color : "#000";
    const prBadge = isPR ? `<span class="pr-badge pr-badge-anim">🏆 PR</span>` : '';
    setRowsHTML += `
      <div id="set-row-${dayKey}-${block.id}-${ex.id}-${i}" class="set-row${done?" done":""}" role="row">
        <div class="set-num" style="${numStyle}">${done?(isPR?'🏆':SVG_CHECK_SM):(i+1)}</div>
        <input id="inp-w-${dayKey}-${block.id}-${ex.id}-${i}" class="set-input inp-w" type="number" placeholder="kg"
          value="${w}" ${done?"disabled":""} autocomplete="off" aria-label="Peso serie ${i+1}"
          oninput="saveWeight('${dayKey}','${block.id}','${ex.id}',${i},${ex.sets},this.value)">
        <span class="set-sep" aria-hidden="true">×</span>
        <input id="inp-r-${dayKey}-${block.id}-${ex.id}-${i}" class="set-input inp-r" type="number" placeholder="reps"
          value="${r}" ${done?"disabled":""} autocomplete="off" aria-label="Reps serie ${i+1}"
          oninput="saveReps('${dayKey}','${block.id}','${ex.id}',${i},${ex.sets},this.value)">
        <input id="inp-rpe-${dayKey}-${block.id}-${ex.id}-${i}" class="rpe-input" type="number" min="1" max="10"
          placeholder="—" value="${rpe}" ${done?"disabled":""} autocomplete="off" aria-label="RPE serie ${i+1}"
          oninput="saveRpe('${dayKey}','${block.id}','${ex.id}',${i},${ex.sets},this.value)">
        <button class="btn-check" ${done?"disabled":""} aria-label="Completar serie ${i+1}"
          style="background:${btnBg};color:${btnColor};box-shadow:${done?"none":`0 3px 12px ${hex2rgb(color,0.27)}`};cursor:${done?"default":"pointer"}"
          data-day="${dayKey}" data-block="${block.id}" data-ex="${ex.id}" data-set="${i}"
          data-numsets="${ex.sets}" data-rest="${block.rest}" data-color="${color}"
          data-iss="${isSS}" data-exids="${block.exercises.map(e=>e.id).join(',')}"
          onclick="handleCheck(this)">
          ${SVG_CHECK}
        </button>
      </div>${prBadge?`<div style="padding:3px 0 6px;padding-left:42px">${prBadge}</div>`:''}`;
  }

  const prefillBadge = data.prefilled
    ? `<span style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:2px 7px;margin-left:4px">↺ últ. sesión</span>`
    : '';

  return `
    <div id="ex-card-${dayKey}-${block.id}-${ex.id}" class="ex-card"
      style="border-radius:${br};background:${cardBg};border-color:${cardBorder};margin-bottom:${isSS&&!isLast?"2px":"12px"}">
      <div class="ex-header">
        <div class="ex-id-badge" style="color:${idColor};background:${idBg};border-color:${idBorder}" aria-label="Ejercicio ${ex.id}">${ex.id}</div>
        <div style="flex:1">
          <div class="ex-name" style="color:${nameColor}">${ex.name}${prefillBadge}</div>
          <div class="ex-meta">${ex.sets} series · <span style="color:${repsColor}">${ex.repsLabel} reps</span></div>
        </div>
        <button id="btn-notes-${dayKey}-${block.id}-${ex.id}" class="btn-notes" onclick="toggleNotes('${dayKey}','${block.id}','${ex.id}')" aria-label="Notas del ejercicio">📝</button>
      </div>
      <textarea id="notes-${dayKey}-${block.id}-${ex.id}" class="notes-textarea"
        placeholder="Notas libres: sensaciones, técnica, ajuste de peso..."
        oninput="saveNote('${dayKey}','${block.id}','${ex.id}',${ex.sets},this.value)">${data.notes}</textarea>
      <div class="col-headers" role="row">
        <div></div><div class="col-hdr">PESO (kg)</div><div></div><div class="col-hdr">REPS</div><div class="col-hdr">RPE</div><div class="col-hdr">✓</div>
      </div>
      ${suggestionHtml}
      ${setRowsHTML}
      <div id="done-badge-${dayKey}-${block.id}-${ex.id}" class="done-badge" style="display:${allDone?"flex":"none"};color:${color}">
        ${SVG_CHECK_SM} Ejercicio completado
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER BLOCK
// ═══════════════════════════════════════════════════════════
function renderBlock(block, dayKey, color) {
  const isSS = block.ss;
  const numSets = block.exercises[0]?.sets || 3;
  let roundBadge = '';
  if (isSS) {
    let minDone = numSets;
    block.exercises.forEach(ex => {
      const data = getExData(dayKey, block.id, ex.id, numSets);
      const done = data.completed.filter(Boolean).length;
      if (done < minDone) minDone = done;
    });
    const allBlockDone = block.exercises.every(ex => getExData(dayKey, block.id, ex.id, numSets).completed.every(Boolean));
    const roundNum = allBlockDone ? numSets : Math.min(minDone + 1, numSets);
    const isActive = minDone > 0 || allBlockDone;
    roundBadge = `<span id="ss-round-${dayKey}-${block.id}" class="ss-round${isActive?' active':''}">${allBlockDone?`✓ ${numSets}/${numSets}`:`${roundNum}/${numSets}`}</span>`;
  }
  const headerHTML = isSS
    ? `<div class="ss-badge" style="background:${hex2rgb(color,0.094)};border-color:${hex2rgb(color,0.267)}">${SVG_ZAP}<span class="ss-badge-txt" style="color:${color}">Súper Serie ${block.id} · ${block.rest}s descanso</span>${roundBadge}</div>`
    : `<span class="block-lbl">Bloque ${block.id} · ${block.rest}s descanso</span>`;
  let exercisesHTML = "";
  block.exercises.forEach((ex,i) => {
    exercisesHTML += renderExerciseCard(ex, block, dayKey, color, isSS, i===0, i===block.exercises.length-1);
  });
  return `
    <div class="block-wrap">
      <div class="block-header">${headerHTML}</div>
      <div class="block-exercises" style="border-left:3px solid ${isSS?hex2rgb(color,0.33):"rgba(255,255,255,0.07)"}">${exercisesHTML}</div>
      <div id="timerbox-block-${dayKey}-${block.id}" class="timer-wrap" style="display:none;margin-left:15px" aria-live="polite"></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER DAY
// ═══════════════════════════════════════════════════════════
function renderDay() {
  const day = PLAN[activeDay], color = day.color;
  document.getElementById("bg-glow").style.background = `radial-gradient(circle, ${hex2rgb(color,0.082)} 0%, transparent 70%)`;

function planAddExercise(dayKey, blockIdx) {
  const block = planDraft[dayKey].blocks[blockIdx];
  const newId = block.id + (block.exercises.length + 1);
  block.exercises.push({ id: newId, name: 'Nuevo ejercicio', sets: 3, repsLabel: '10-12' });
  renderPlanEditor();
  // Re-open the day that was being edited
  togglePlanDay(dayKey);
}

function planRemoveExercise(dayKey, blockIdx, exIdx) {
  if (planDraft[dayKey].blocks[blockIdx].exercises.length <= 1) {
    showToast('El bloque debe tener al menos 1 ejercicio', '#f87171'); return;
  }
  planDraft[dayKey].blocks[blockIdx].exercises.splice(exIdx, 1);
  renderPlanEditor();
  togglePlanDay(dayKey);
}

function swapExerciseData(dayKey, blockId, exIdA, exIdB) {
  const allData = loadData();
  const suffix = `_${dayKey}_${blockId}_`;
  const keysA = Object.keys(allData).filter(k => k.includes(`${suffix}${exIdA}`));
  const keysB = Object.keys(allData).filter(k => k.includes(`${suffix}${exIdB}`));

  // Rename A → tmp
  keysA.forEach(k => {
    const newKey = k.replace(`${suffix}${exIdA}`, `${suffix}__tmp__`);
    allData[newKey] = allData[k]; delete allData[k];
  });
  // Rename B → A
  keysB.forEach(k => {
    const newKey = k.replace(`${suffix}${exIdB}`, `${suffix}${exIdA}`);
    allData[newKey] = allData[k]; delete allData[k];
  });
  // Rename tmp → B
  Object.keys(allData).filter(k => k.includes(`${suffix}__tmp__`)).forEach(k => {
    const newKey = k.replace(`${suffix}__tmp__`, `${suffix}${exIdB}`);
    allData[newKey] = allData[k]; delete allData[k];
  });

  saveData(allData);
  renderDay();
  showToast(`✓ Datos de ${exIdA} y ${exIdB} intercambiados`, '#4ade80');
}

function savePlanFromEditor() {
  if (!planDraft) return;

function setupSwipe() {
  let startX = 0, startY = 0;
  const el = document.getElementById('entreno-view');
  el.addEventListener('touchstart', e => {
    startX = e.changedTouches[0].clientX;
    startY = e.changedTouches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.6) {
      const idx = DAY_ORDER.indexOf(activeDay);
      if (dx < 0 && idx < DAY_ORDER.length - 1) switchDay(DAY_ORDER[idx + 1]);
      else if (dx > 0 && idx > 0) switchDay(DAY_ORDER[idx - 1]);
    }
  }, { passive: true });
}

function setDriveStatus(state, msg, detail) {

async function driveLoadOrCreate() {
  try {
    const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`, { headers: { Authorization: 'Bearer ' + driveAccessToken } });
    const data = await res.json();
    if (data.files && data.files.length > 0) {
      driveFileId = data.files[0].id; await drivePullAndMerge();
    } else { await driveCreateFile(); setDriveStatus('ok', driveUserEmail ? '✓ '+driveUserEmail : '✓ Drive conectado'); }
  } catch(e) { setDriveStatus('err', 'Error al conectar', e.message||String(e)); }
}

async function driveCreateFile() {
  const body = JSON.stringify(loadData());
  const meta = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', new Blob([body], {type:'application/json'}));
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', { method: 'POST', headers: { Authorization: 'Bearer ' + driveAccessToken }, body: form });
  const d = await res.json(); driveFileId = d.id;
}

async function drivePullAndMerge() {
  setDriveStatus('syncing', 'Sincronizando…');
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, { headers: { Authorization: 'Bearer ' + driveAccessToken } });
    const remote = await res.json();
    const local = loadData();
    const merged = { ...remote };
    // Merge local keys not in remote
    Object.keys(local).forEach(k => { if (!(k in merged)) merged[k] = local[k]; });
    // Conflict resolution: prefer newer by lastModified, then by completed count
    Object.keys(remote).forEach(k => {
      if (!local[k]) return;
      const lt = local[k].lastModified || 0, rt = remote[k].lastModified || 0;
      if (lt > rt) { merged[k] = local[k]; return; }
      if (rt > lt) { merged[k] = remote[k]; return; }
      const lc = local[k].completed ? local[k].completed.filter(Boolean).length : 0;
      const rc = remote[k].completed ? remote[k].completed.filter(Boolean).length : 0;
      merged[k] = rc >= lc ? remote[k] : local[k];
    });
    saveData(merged); renderDay();
    await drivePush(merged);
    setDriveStatus('ok', driveUserEmail ? '✓ '+driveUserEmail : '✓ Sincronizado');
  } catch(e) { setDriveStatus('err', 'Error al sincronizar', e.message||String(e)); }
}

async function drivePush(data) {
  if (!driveAccessToken || !driveFileId) return;
  try {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + driveAccessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(data || loadData())
    });
  } catch(e) { console.error('Drive push error:', e); }
}

function scheduleDriveSync(d) {
  if (driveAccessToken && driveFileId) {
    clearTimeout(driveSyncTimeout);
    setDriveStatus('syncing', 'Guardando…');
    driveSyncTimeout = setTimeout(async () => {
      await drivePush(d);
      setDriveStatus('ok', driveUserEmail ? '✓ '+driveUserEmail : '✓ Guardado en Drive');
    }, 1500);
  }
}

function trySilentAuth() {
  try {
    if (typeof google === 'undefined' || !google.accounts) { setTimeout(trySilentAuth, 500); return; }
    const client = google.accounts.oauth2.initTokenClient({

            const ud = await ui.json(); driveUserEmail = ud.email || '';
          } catch(e) {}
          showDriveConnected(); setDriveStatus('syncing', 'Reconectando…'); await driveLoadOrCreate();
        }
      }
    });
    client.requestAccessToken({ prompt: '' });
  } catch(e) {}
}
